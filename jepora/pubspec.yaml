name: jepora
description: Booking Jeep Wisata Dieng - JeepOra App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1
  dio: ^5.4.3

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Biometric
  local_auth: ^2.2.0

  # Navigation
  go_router: ^13.2.0

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5
  lottie: ^3.1.2

  # Maps (OpenStreetMap - gratis)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Location / GPS
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Sensor
  sensors_plus: ^4.0.2

  # Image picker (untuk upload avatar/bukti bayar)
  image_picker: ^1.1.1

  # Intl (format tanggal, mata uang)
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
